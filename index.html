<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Followers UI Demo</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background: linear-gradient(135deg, #6a11cb, #ff3c6f);
}

/* Center container */
.main-container {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

/* Card */
.card {
  background: #fff;
  padding: 25px;
  border-radius: 15px;
  width: 320px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  text-align: center;
}

/* Title */
.card h2 {
  margin-bottom: 20px;
}

/* Input */
input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
  outline: none;
}

/* Button */
button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: #ff3c6f;
  color: #fff;
  font-size: 16px;
  cursor: pointer;
  margin-top: 10px;
}

button:hover {
  opacity: 0.9;
}

/* Status text */
.status {
  margin-top: 15px;
  font-size: 14px;
  color: green;
}

/* Footer badges */
.footer {
  display: flex;
  justify-content: space-around;
  padding: 10px;
  color: #fff;
  font-size: 14px;
}
</style>

</head>
<body>

<div class="main-container">
  <div class="card">
    <h2>Followers Demo</h2>

    <input type="text" id="username" placeholder="Enter Username">
    <input type="number" id="amount" placeholder="How many followers">

    <button onclick="sendFollowers()">Get Followers</button>

    <div class="status" id="status"></div>
  </div>
</div>

<div class="footer">
  <span>⚡ Fast</span>
  <span>🔒 Secure</span>
  <span>🚀 Demo UI</span>
</div>

<script>
function sendFollowers() {
  let user = document.getElementById("username").value;
  let amount = document.getElementById("amount").value;

  if(user === "" || amount === "") {
    document.getElementById("status").innerText = "Fill all fields!";
    document.getElementById("status").style.color = "red";
    return;
  }

  document.getElementById("status").style.color = "green";
  document.getElementById("status").innerText = 
    "Processing...";

  setTimeout(() => {
    document.getElementById("status").innerText = 
      "Followers sent successfully (demo)";
  }, 2000);
}
</script>

</body>
</html>
